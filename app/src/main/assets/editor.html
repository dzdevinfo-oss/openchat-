<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
        }
        #container {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Load Monaco Editor via CDN for simplicity in this example -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
        window.MonacoEnvironment = { getWorkerUrl: () => proxy };
        let proxy = URL.createObjectURL(new Blob([`
            self.MonacoEnvironment = {
                baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/'
            };
            importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/base/worker/workerMain.js');
        `], { type: 'text/javascript' }));
    </script>
</head>
<body>
<div id="container"></div>

<script>
    let editor = null;

    function getLanguageFromExtension(ext) {
        const map = {
            'js': 'javascript', 'ts': 'typescript',
            'py': 'python', 'kt': 'kotlin', 'java': 'java',
            'html': 'html', 'css': 'css', 'json': 'json',
            'md': 'markdown', 'sql': 'sql', 'sh': 'shell'
        };
        return map[ext.toLowerCase()] || 'plaintext';
    }

    function initEditor(content, extension) {
        require(['vs/editor/editor.main'], function () {
            if (editor) {
                editor.setValue(content);
                monaco.editor.setModelLanguage(editor.getModel(), getLanguageFromExtension(extension));
                return;
            }
            editor = monaco.editor.create(document.getElementById('container'), {
                value: content,
                language: getLanguageFromExtension(extension),
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                wordWrap: 'on',
                fontSize: 14,
                lineNumbers: 'on',
                formatOnPaste: true,
                padding: { top: 16 }
            });
            
            // Re-bind cmd/ctrl-s to Android save
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                if(window.Android && window.Android.receiveContent) {
                    window.Android.receiveContent(editor.getValue());
                }
            });
        });
    }
</script>
</body>
</html>
